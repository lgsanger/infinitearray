<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Enzo Mari redux</title>
    <style>
        body {
            background-color: #cde9e8;
            font-family: "Courier New", Courier, monospace;
        }

        img {
            max-width: 100%;
            cursor: pointer;
        }

        div {
            display:inline-block;
        }
    </style>
</head>

<body>
    <div class="credit">This website is based on the design of the <a href="https://enzomari.com/">Enzo Mari archive</a> by <a href="https://jon-l.com/">Jon Lucas</a>.<br>It is a collection of images from my family's trip to Cozumel to celebrate my parents' 20th anniversary!</div>
    
    <script>
        // define your "batch of images" in an array
       var images = [
                "<img src='images/FullSizeRender.jpeg'>",
                "<img src='images/IMG_2448.jpeg'>",
                "<img src='images/IMG_2471.jpeg'>",
                "<img src='images/IMG_2472.jpeg'>",
                "<img src='images/IMG_2473.jpeg'>",
                "<img src='images/IMG_2503.jpeg'>",
                "<img src='images/IMG_2549.jpeg'>",
                "<img src='images/IMG_2551.jpeg'>",
                "<img src='images/IMG_2553.jpeg'>",
                "<img src='images/IMG_2588.jpeg'>",
                "<img src='images/IMG_2593.jpeg'>",
                "<img src='images/IMG_2658.jpeg'>",
                "<img src='images/IMG_2705.jpeg'>",
                "<img src='images/IMG_2709.jpeg'>",
                "<img src='images/IMG_3319.JPG'>",
                "<img src='images/IMG_3324.JPG'>",
                "<img src='images/IMG_3325.JPG'>",
                "<img src='images/IMG_3336.JPG'>",
                "<img src='images/IMG_3339.JPG'>",
                "<img src='images/IMG_3359.jpeg'>",
                "<img src='images/IMG_3362.jpeg'>",
                "<img src='images/IMG_3364.JPG'>",
                "<img src='images/IMG_3394.JPG'>",
                "<img src='images/IMG_3409.jpeg'>",
            ]

        // this function randomly picks an image from the batch
        function random_image() {
            return Math.floor(Math.random() * images.length);
        }

        // this function adds the randomly-selected image to the page
        function add_image() {

            // first you make a new div for the image.
            var new_image = document.createElement('div');

            // then you set the div's inner-HTML, ie its content, to the chosen img tag
            new_image.innerHTML = images[random_image()];

            // these two lines pick a random width for the image.
            // 300 is the MAX width, and 100 is the MIN width.
            var random_width = Math.floor(Math.random() * (300 - 100 + 1) + 100);
            var random_width_pixels = random_width + "px";

            // assign that random width to the new image
            new_image.style.width = random_width_pixels;

            // add the new image to the document's body (so it's visible!)
            document.body.prepend(new_image);
        }

        document.body.addEventListener('click', function (e) {
            if (e.target.closest('a')) {
                return;
            }
            add_image();
        });

        // so that the first image appears when the page load, run the function once.
        add_image();
    </script>
</body>

</html>
